    <rect x="-11" y="-11" width="22" height="22" rx="2" fill="#0d0d0d" opacity="0.6"/>
    <circle cx="-52" cy="0" r="20" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5"/>
